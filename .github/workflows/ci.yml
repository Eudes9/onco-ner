# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov ruff
          pip install transformers==4.49.0
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install rapidfuzz polars==1.9.0 pydantic fastapi httpx

      - name: Debug package structure
        run: |
          python -c "import onco_ner; print('onco_ner OK:', onco_ner.__file__)"
          python -c "from onco_ner.data import brat_parser; print('onco_ner.data OK')"
          pip show onco-ner

      - name: Lint with Ruff
        run: |
          ruff check src/

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v \
            --cov=src/onco_ner \
            --cov-report=term-missing \
            --cov-report=xml \
            -m "not spark"
        env:
          PYTHONPATH: src

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false